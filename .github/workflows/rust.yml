name: Rust

on: [push]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mesa-vulkan-drivers libvulkan1 clang libclang-dev libopencv-dev
    - name: Build
      run: cargo build --verbose
    - name: Lint
      run: cargo clippy --verbose --all-targets --all-features -- -D warnings
    - name: Run tests
      run: cargo test --verbose

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: brew install opencv
    - name: Set libclang path
      run: |
        LIBCLANG_DIR="$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib"
        echo "LIBCLANG_PATH=$LIBCLANG_DIR" >> $GITHUB_ENV
        echo "DYLD_LIBRARY_PATH=$LIBCLANG_DIR" >> $GITHUB_ENV
    - name: Build
      run: cargo build --verbose
    - name: Lint
      run: cargo clippy --verbose --all-targets --all-features -- -D warnings
    - name: Run tests
      run: cargo test --verbose
