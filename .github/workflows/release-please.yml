name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to upload wheels to (e.g. fishsense-core-v1.7.0). Leave blank for the normal release-please flow."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['rust/fishsense-core--release_created'] }}
      tag_name: ${{ steps.release.outputs['rust/fishsense-core--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-wheel:
    needs: release-please
    if: |
      always() && (
        needs.release-please.outputs.release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.tag != '')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --strip --manifest-path python/fishsense_core/Cargo.toml --out target/wheels --find-interpreter
          target: x86_64-unknown-linux-gnu
          manylinux: 2_34
          before-script-linux: |
            dnf install -y dnf-plugins-core epel-release
            dnf config-manager --set-enabled crb
            dnf install -y llvm-devel clang-devel opencv-devel openblas-devel openssl-devel
      - name: Upload wheel to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag != '' && inputs.tag || needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" target/wheels/*.whl
