name: Maturin

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python/fishsense_core
          args: --release --out dist --find-interpreter
          sccache: true
