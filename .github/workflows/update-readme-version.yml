name: Update README version on release branch

on:
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]

permissions:
  contents: write

jobs:
  update-readme:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release-please--branches--main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from manifest
        id: version
        run: |
          version=$(jq -r '."rust/fishsense-core"' .release-please-manifest.json)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Update README
        run: |
          v="${{ steps.version.outputs.version }}"
          sed -i -E "s/(fishsense-core-v)[0-9]+\.[0-9]+\.[0-9]+/\1${v}/g" README.md
          sed -i -E "s/(fishsense_core-v)[0-9]+\.[0-9]+\.[0-9]+/\1${v}/g" README.md

      - name: Commit and push if changed
        run: |
          if git diff --quiet README.md; then
            echo "README.md already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README to ${{ steps.version.outputs.version }}"
          git push origin HEAD:release-please--branches--main
